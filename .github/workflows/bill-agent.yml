name: Daily Bill Check

on:
  schedule:
    # ~08:50 America/Toronto (EDT, UTC-4). Drifts to 07:50 local during EST (UTC-5).
    # To change the run time, edit this cron expression (always in UTC).
    - cron: "50 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-bills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry==1.8.5

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi --no-root

      - name: Restore Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials/credentials.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > credentials/token.json

      - name: Run bill agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          LOG_FILE: logs/bills.log
        run: |
          mkdir -p logs
          poetry run python src/agent.py
